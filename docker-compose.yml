services:
  postgres:
    image: postgres:16
    container_name: sg-rsc-postgres
    environment:
      POSTGRES_DB: sgrsc
      POSTGRES_USER: sgrsc
      POSTGRES_PASSWORD: sgrsc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
