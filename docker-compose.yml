services:
  postgres:
    image: postgres:16
    container_name: sg-rsc-postgres
    environment:
      POSTGRES_DB: sgrsc
      POSTGRES_USER: sgrsc
      POSTGRES_PASSWORD: sgrsc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - sg-rsc-network

  keycloak-postgres:
    image: postgres:16
    container_name: sg-rsc-keycloak-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - sg-rsc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.7.0
    container_name: sg-rsc-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak

      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sg-rsc-network

volumes:
  postgres_data:
  keycloak_postgres_data:

networks:
  sg-rsc-network:
    driver: bridge